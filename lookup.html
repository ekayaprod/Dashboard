<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lookup</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Accessibility & Fluid UX Enhancements */
        /* Edge Sidebar Guard overrides standard 44px targets to 32px for compact layout. */
        .form-control, .btn, .btn-icon, .icon-btn, select, input, textarea {
            min-height: 32px;
            transition: all 0.3s ease-in-out;
        }

        .btn-icon, .icon-btn {
            min-width: 32px;
        }

        :focus-visible {
            outline: 2px solid var(--primary-color);
            outline-offset: 2px;
            border-radius: 2px;
        }

        @media (max-width: 480px) {
            .form-control, .btn, .btn-icon, .icon-btn, select, input, textarea {
                min-height: 32px;
            }
            .btn-icon, .icon-btn {
                min-width: 32px;
            }
            #search-input {
                min-height: 32px;
            }
        }
        @media (prefers-reduced-motion: no-preference) {
            .btn:active, .btn-icon:active, .icon-btn:active { transform: scale(0.98); }
            .result-list li {
                transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out, border-color 0.3s ease-in-out;
            }
            .result-list li:hover {
                transform: translateY(-1px);
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
                border-color: var(--primary-color);
            }
            .result-list li:active {
                transform: translateY(0) scale(0.99);
                box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            }
        }

        .search-wrapper {
            transition: box-shadow 0.3s ease-in-out, transform 0.3s ease-in-out;
        }

        .search-wrapper:focus-within {
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15);
            transform: translateY(-1px);
        }

        /* .btn-clear interactions */
        .btn-clear {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (prefers-reduced-motion: no-preference) {
            .btn-clear:hover {
                transform: translateY(-1px) scale(1.02);
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            }
            .btn-clear:active {
                transform: translateY(0) scale(0.95);
                box-shadow: none;
            }
        }

        /* Ensuring the glassmorphism aesthetic if search control container has background */
        .search-controls {
            padding: var(--spacing-sm);
            margin-bottom: var(--spacing-sm);
            background-color: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(226, 232, 240, 0.5);
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        @media (prefers-color-scheme: dark) {
            .search-controls {
                background-color: rgba(31, 41, 55, 0.4);
                border-color: rgba(75, 85, 99, 0.5);
            }
        }

        /* Target 4: Scroll-to-Top fluid transitions */
        @media (prefers-reduced-motion: no-preference) {
            #scroll-to-top {
                transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out, background-color 0.3s ease-in-out;
            }
            #scroll-to-top.visible:hover {
                transform: translateY(-2px);
            }
            #scroll-to-top.visible:active {
                transform: translateY(0) scale(0.95);
            }
        }

        .empty-state-container {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.1)) !important;
            backdrop-filter: blur(10px) !important;
            -webkit-backdrop-filter: blur(10px) !important;
            border: 1px solid rgba(226, 232, 240, 0.6) !important;
            border-radius: 1rem !important;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03) !important;
            transition: all 0.3s ease-in-out !important;
        }

        @media (prefers-color-scheme: dark) {
            .empty-state-container {
                background: linear-gradient(145deg, rgba(31, 41, 55, 0.4), rgba(31, 41, 55, 0.1)) !important;
                border-color: rgba(75, 85, 99, 0.6) !important;
            }
        }


        #app-startup-error {
            background: linear-gradient(to right, #fef2f2, #fee2e2);
            border: 1px solid #fca5a5;
            box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.1);
            color: #991b1b;
            padding: 1rem;
            border-radius: var(--border-radius);
            margin-bottom: var(--spacing-sm);
        }
        @media (prefers-reduced-motion: no-preference) {
            #app-startup-error:not(.hidden) {
                animation: slideInUp 0.3s ease-out forwards;
            }
        }

        #btn-edit-mode, #btn-add-new-entry {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            font-weight: 600;
            letter-spacing: 0.025em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #btn-edit-mode:hover, #btn-add-new-entry:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        #btn-edit-mode:active, #btn-add-new-entry:active {
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        @media (prefers-reduced-motion: no-preference) {
            #btn-edit-mode:hover, #btn-add-new-entry:hover {
                transform: translateY(-1px);
            }
            #btn-edit-mode:active, #btn-add-new-entry:active {
                transform: translateY(0) scale(0.98);
            }
        }

    </style>
</head>
<body class="lookup-page">

    <div class="app-container">
        <div class="panel">
            <div class="main-content">
                <div id="app-startup-error" class="hidden app-startup-banner"></div>
                
                <div class="generator-section"> 
                    <header class="section-header-wrapper">
                        <h3 class="section-header">Lookup</h3>
                        <div class="header-actions button-group">
                            <button id="btn-settings" class="btn-icon" title="Settings" aria-label="Settings"></button>
                            <button id="btn-edit-mode" class="btn" title="Manage Entries">Manage</button>
                        </div>
                    </header>
                    <div class="search-controls">
                        <div class="search-wrapper">
                            <input type="text" id="search-input" class="form-control" placeholder="Search keywords, groups, or paths...">
                            <div id="search-spinner" class="spinner hidden" aria-hidden="true"></div>
                        </div>
                        <button id="btn-clear-search" class="btn-clear hidden" title="Clear Search">
                            <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                            Clear
                        </button>
                    </div>
                    <div id="results-status" aria-live="polite"></div>
                </div>

                <section id="custom-search-section" class="generator-section">
                     <div id="custom-search-buttons" class="button-group"></div>
                </section>

                <main class="results-container generator-section">
                    <section class="column" id="local-column">
                        <div class="local-header section-header-wrapper">
                            <h3 class="section-header">Local Entries</h3>
                            <button id="btn-add-new-entry" class="btn btn-primary hidden" title="Add new entry">New Entry</button>
                        </div>
                        <ul id="local-results" class="result-list"></ul>
                    </section>
                </main>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <div id="modal-overlay" class="modal-overlay">
        <div id="modal-content" class="modal-content"></div>
    </div>
    
    <!-- Scroll to Top Button -->
    <button id="scroll-to-top" class="scroll-to-top-btn" title="Back to Top" aria-label="Back to Top">↑</button>

    <!-- 
      CRITICAL: Bootstrap script must be at the END of the body.
      It loads the Navbar HTML and all JS dependencies in parallel.
    -->
    <script src="js/bootstrap.js"></script>
</body>
</html>
