<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Edge Sidebar Guard: Do not increase form-control or btn sizing to 44px. They must remain compact for the sidebar layout. */
        .form-control, .btn, .btn-icon, .icon-btn, select, input, textarea {
            min-height: 32px;
            transition: all 0.3s ease-in-out;
        }

        .btn-icon, .icon-btn {
            min-width: 32px;
        }

        /* Target buttons and inputs above text editor */
        .actions-menu-wrapper .btn-icon,
        #app-select,
        #app-empty-state .btn,
        #edit-app-name,
        #save-changes-btn,
        #delete-app-btn,
        #notepad-header .btn-icon,
        #note-select {
            min-height: 24px;
            height: 24px;
            padding: 2px 4px;
            font-size: 0.75rem;
        }

        #edit-app-urls,
        #edit-app-escalation {
            min-height: 32px;
            height: 32px;
            padding: 2px 4px;
            font-size: 0.75rem;
        }

        #notepad-header {
            margin-bottom: 4px;
        }

        :focus-visible {
            outline: 2px solid var(--primary-color);
            outline-offset: 2px;
            border-radius: 2px;
        }

        @media (prefers-reduced-motion: no-preference) {
            .btn:active, .btn-icon:active, .icon-btn:active { transform: scale(0.95); transition: transform 0.15s ease-in-out; }
            @keyframes float {
                0%, 100% { transform: translateY(0); }
                50% { transform: translateY(-5px); }
            }
            .empty-state-icon { animation: float 3s ease-in-out infinite; }
            #app-details-container:not(.hidden) { animation: slideInUp 0.3s ease-out; }
            .modal-content {
                animation: slideInUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            }
        }
        /* Edge Sidebar Guard: Force compact layouts to maximize vertical space */
        .main-content {
            padding: 0.25rem !important;
            gap: 0.25rem !important;
        }
        .form-group {
            margin-bottom: 0.25rem !important;
        }
        .form-group label {
            margin-bottom: 0.1rem !important;
            font-size: 0.75rem !important;
        }
        .section-header-wrapper {
            margin-bottom: 0.1rem !important;
        }
        .shortcuts-container {
            gap: 0.25rem !important;
        }
        .notepad-wrapper {
            min-height: 50vh !important;
        }

        @media (max-width: 480px) {
            :root {
                --spacing-lg: 0.5rem;
                --border-radius: 0.5rem;
            }
            .form-control, .btn, .btn-icon, .icon-btn, select, input, textarea {
                min-height: 32px;
            }
            .btn-icon, .icon-btn {
                min-width: 32px;
            }
        }
        .shortcut-item { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 0.75rem; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1); }
        .shortcut-item:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1); border-color: var(--primary-color); }
        .shortcut-item:active { transform: translateY(0) scale(0.95); }

        .generator-section {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            transition: box-shadow 0.3s ease-in-out, transform 0.3s ease-in-out;
            margin-bottom: 0.25rem;
        }

        @media (prefers-reduced-motion: no-preference) {
            .generator-section:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            }
        }

        #app-startup-error {
            background: linear-gradient(to right, #fef2f2, #fee2e2);
            border: 1px solid #fca5a5;
            box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.1);
            color: #991b1b;
            padding: 1rem;
            border-radius: var(--border-radius);
            margin-bottom: var(--spacing-sm);
        }
        @media (prefers-reduced-motion: no-preference) {
            #app-startup-error:not(.hidden) {
                animation: slideInUp 0.3s ease-out forwards;
            }
        }

        .empty-state-container {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.1));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.6);
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            transition: all 0.3s ease-in-out;
        }

        @media (prefers-color-scheme: dark) {
            .empty-state-container {
                background: linear-gradient(145deg, rgba(31, 41, 55, 0.4), rgba(31, 41, 55, 0.1));
                border-color: rgba(75, 85, 99, 0.6);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="panel" style="box-shadow: var(--box-shadow-lg);">
            <div class="main-content">
                <div id="app-startup-error" class="hidden app-startup-banner"></div>

                <div id="shortcuts-container" class="shortcuts-container"></div>

                <div class="section-header-wrapper">
                    <h3 id="app-section-header" class="section-header">Applications</h3>
                    <div class="actions-menu-wrapper button-group">
                        <button id="add-shortcut-btn-menu" class="btn btn-icon" title="New Shortcut" aria-label="Add Shortcut"></button>
                        <button id="add-new-app-btn-menu" class="btn btn-icon" title="New Application" aria-label="Add Application"></button>
                        <button id="btn-settings" class="btn-icon" title="Settings" aria-label="Settings"></button>
                    </div>
                </div>
                 <div class="form-group" id="app-select-group">
                    <label for="app-select">Manage Application</label>
                    <select id="app-select" class="form-control"></select>
                </div>
                <div id="app-empty-state" class="empty-state-container hidden" style="animation: fadeIn 0.3s ease-out forwards; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem 0.5rem; text-align: center; gap: 0.25rem; background: linear-gradient(145deg, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.1)); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.6); border-radius: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03); transition: all 0.3s ease-in-out;">
                    <style>
                        @keyframes float-icon {
                            0%, 100% { transform: translateY(0); }
                            50% { transform: translateY(-3px); }
                        }
                        @media (prefers-reduced-motion: no-preference) {
                            .empty-state-icon-anim { animation: float-icon 3s ease-in-out infinite; }
                        }
                    </style>
                    <svg class="empty-state-icon empty-state-icon-anim" style="width: 32px; height: 32px; color: var(--border-color); margin-bottom: 0.25rem; opacity: 0.6;" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
                    </svg>
                    <span class="empty-state-text" style="font-size: 0.9rem; font-weight: 500; color: var(--subtle-text);">No applications found. Create one to get started.</span>
                    <button class="btn btn-primary" style="margin-top: 0.5rem;" onclick="document.getElementById('add-new-app-btn-menu').click()">Create Application</button>
                </div>

                <div id="app-details-container" class="hidden">
                    <div id="app-editor-fields" class="generator-section">
                        <div class="form-group hidden" id="edit-app-name-wrapper">
                            <label for="edit-app-name">Application Name</label>
                            <input type="text" id="edit-app-name" class="form-control" placeholder="e.g. Jira, Confluence">
                        </div>
                        <div class="form-group">
                            <label for="edit-app-urls">Launch URLs</label>
                            <textarea id="edit-app-urls" class="form-control sidebar-textarea" placeholder="https://..."></textarea>
                        </div>
                        <div class="form-group">
                            <div class="label-group">
                                <label for="edit-app-escalation">Notes & Procedures</label>
                                <div class="button-group">
                                    <button id="save-changes-btn" class="btn btn-primary save-btn">Save Changes</button>
                                    <button id="delete-app-btn" class="btn-icon delete-btn" title="Delete Application" aria-label="Delete Application"></button>
                                </div>
                            </div>
                            <textarea id="edit-app-escalation" class="form-control sidebar-textarea" placeholder="Enter notes or quick scratchpad info..."></textarea>
                        </div>
                    </div>
                </div>

                <div class="notepad-wrapper generator-section">
                    <div id="notepad-header" class="notepad-header">
                        <select id="note-select" class="form-control" aria-label="Select Note"></select>
                        <button id="new-note-btn" class="btn btn-icon" title="New Note" aria-label="New Note"></button>
                        <button id="rename-note-btn" class="btn btn-icon" title="Rename Note" aria-label="Rename Note"></button>
                        <button id="delete-note-btn" class="btn btn-icon" title="Delete Current Note" aria-label="Delete Current Note"></button>
                    </div>
                    <textarea id="notepad-editor" class="notepad-editor form-control" placeholder="Enter notes or quick scratchpad info..." aria-label="Notepad Content"></textarea>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay">
        <div id="modal-content" class="modal-content"></div>
    </div>
    <div id="toast" class="toast"></div>

    <script src="js/bootstrap.js"></script>
</body>
</html>
