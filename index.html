<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Suite</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        .navbar {
            flex-shrink: 0;
            z-index: 10;
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border-bottom: 1px solid rgba(226, 232, 240, 0.6);
        }

        @media (prefers-color-scheme: dark) {
            .navbar {
                background-color: rgba(31, 41, 55, 0.85);
                border-bottom: 1px solid rgba(75, 85, 99, 0.6);
            }
        }

        #app-frame {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
            display: block;
        }

        .nav-link {
            transition: all 0.3s ease-in-out;
        }

        .nav-link:focus-visible {
            outline: 2px solid var(--primary-color, #3b82f6);
            outline-offset: 4px;
            border-radius: 4px;
        }

        @media (prefers-reduced-motion: no-preference) {
            .nav-link:hover {
                transform: scale(1.02);
                background-color: rgba(59, 130, 246, 0.1);
                border-radius: 4px;
            }
            .nav-link:active {
                transform: scale(0.95);
            }
        }

        @media (max-width: 480px) {
            .nav-link {
                min-height: 32px;
                min-width: 32px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <ul class="navbar-links">
            <li><a href="#" data-href="dashboard.html" class="nav-link">Dashboard</a></li>
            <li><a href="#" data-href="lookup.html" class="nav-link">Lookup</a></li>
            <li><a href="#" data-href="passwords.html" class="nav-link">Passwords</a></li>
            <li><a href="#" data-href="mailto.html" class="nav-link">MailTo</a></li>
            <li><a href="#" data-href="calculator.html" class="nav-link">Calculator</a></li>
        </ul>
        <div class="nav-actions"></div>
    </nav>

    <iframe id="app-frame" title="Application Content" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads"></iframe>

    <!-- Bootstrap Loader -->
    <script src="js/bootstrap.js"></script>
</body>
</html>
