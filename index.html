<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tool Suite</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        .navbar {
            flex-shrink: 0;
            z-index: 10;
        }

        #app-frame {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 🎨 THE FLUID CANVAS: Enhanced Nav Links */
        .nav-link {
            transition: all 0.3s ease-in-out;
        }

        @media (prefers-reduced-motion: no-preference) {
            .nav-link:hover {
                transform: translateY(-2px);
                color: var(--primary-color);
            }
        }

        .nav-link:focus-visible {
            outline: none;
            box-shadow: 0 0 0 2px var(--primary-color);
            border-radius: var(--border-radius-sm);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <ul class="navbar-links">
            <li><a href="#" data-href="dashboard.html" class="nav-link">Dashboard</a></li>
            <li><a href="#" data-href="lookup.html" class="nav-link">Lookup</a></li>
            <li><a href="#" data-href="passwords.html" class="nav-link">Passwords</a></li>
            <li><a href="#" data-href="mailto.html" class="nav-link">MailTo</a></li>
            <li><a href="#" data-href="calculator.html" class="nav-link">Calculator</a></li>
        </ul>
        <div class="nav-actions"></div>
    </nav>

    <iframe id="app-frame" title="Application Content" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads"></iframe>

    <!-- Bootstrap Loader -->
    <script src="js/bootstrap.js"></script>
</body>
</html>
